{{- range .Values.groups }}
apiVersion: user.openshift.io/v1
kind: Group
metadata:
  name: {{ .name }}
{{- if .users }}
users:
{{- range .users }}
  - {{ . | quote }}
{{- end }}
{{- else }}
users: []
{{- end }}
---
{{- $groupName := .name -}}
{{- range .clusterRoles }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $groupName }}-{{ . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ . }}
subjects:
- kind: Group
  name: {{ $groupName }}
  apiGroup: rbac.authorization.k8s.io
---
{{- end }}
{{- end }}
