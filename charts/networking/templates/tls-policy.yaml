apiVersion: kuadrant.io/v1
kind: TLSPolicy
metadata:
 name: {{ printf "%s-tls" .Values.maasGateway.name }}
 namespace: {{ .Values.maasGateway.namespace }}
spec:
 targetRef:
   name: {{ .Values.maasGateway.name }}
   group: gateway.networking.k8s.io
   kind: Gateway
 issuerRef:
   group: cert-manager.io
   kind: ClusterIssuer
   name: {{ .Values.clusterIssuer.name }}
