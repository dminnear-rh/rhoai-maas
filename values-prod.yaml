clusterGroup:
  name: prod

  namespaces:
    - openshift-lws-operator
    - cert-manager-operator:
        operatorGroup: true
        targetNamespaces: []
    - redhat-ods-operator:
        operatorGroup: true
        targetNamespaces: []
    - kuadrant-system:
        operatorGroup: true
        targetNamespaces: []

  subscriptions:
    cert-manager:
      name: openshift-cert-manager-operator
      namespace: cert-manager-operator
      channel: stable-v1
    lws:
      name: leader-worker-set
      namespace: openshift-lws-operator
      channel: stable-v1.0
    connectivity-link:
      name: rhcl-operator
      namespace: kuadrant-system
      csv: rhcl-operator.v1.2.1
    rhoai:
      name: rhods-operator
      namespace: redhat-ods-operator
      channel: stable-3.x

  applications:
    rhoai-scaffolding:
      name: rhoai-scaffolding
      path: charts/rhoai-scaffolding
      syncPolicy:
        automated: {}
        retry:
          limit: 20
        syncOptions:
          - SkipDryRunOnMissingResource=true # OdhDashboardConfig CRD will not exists until default-dsc is installed
    networking:
      name: networking
      path: charts/networking
    user-management:
      name: user-management
      path: charts/user-management
    cpu-inference-service:
      name: cpu-inference-service
      path: charts/llm
      extraValueFiles:
        - /overrides/cpu-inference-service.yaml
