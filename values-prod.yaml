clusterGroup:
  name: prod
  namespaces:
    - rhoai-maas
    - redhat-ods-operator:
        operatorGroup: true
        targetNamespaces: []
    - kuadrant-system:
        operatorGroup: true
        targetNamespaces: []
    - openshift-lws-operator
  subscriptions:
    connectivity-link:
      name: rhcl-operator
      namespace: kuadrant-system
    rhoai:
      name: rhods-operator
      namespace: redhat-ods-operator
      channel: stable-3.x
    lws:
      name: leader-worker-set
      namespace: openshift-lws-operator
      channel: stable-v1.0
  applications:
    dsc:
      name: dsc
      namespace: rhoai-maas
      path: charts/dsc
    gateway:
      name: gateway
      namespace: rhoai-maas
      path: charts/gateway
    kuadrant:
      name: kuadrant
      namespace: rhoai-maas
      path: charts/kuadrant
    odh-dashboard:
      name: odh-dashboard
      namespace: rhoai-maas
      path: charts/odh-dashboard
    lws:
      name: lws
      namespace: openshift-lws-operator
      path: charts/lws
