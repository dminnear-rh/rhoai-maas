clusterGroup:
  name: prod

  namespaces:
    - rhoai-maas
    - openshift-lws-operator
    - cert-manager-operator:
        operatorGroup: true
        targetNamespaces: []
    - redhat-ods-operator:
        operatorGroup: true
        targetNamespaces: []
    - kuadrant-system:
        operatorGroup: true
        targetNamespaces: []

  subscriptions:
    cert-manager:
      name: openshift-cert-manager-operator
      namespace: cert-manager-operator
      channel: stable-v1
    lws:
      name: leader-worker-set
      namespace: openshift-lws-operator
      channel: stable-v1.0
    connectivity-link:
      name: rhcl-operator
      namespace: kuadrant-system
      csv: rhcl-operator.v1.2.1
    rhoai:
      name: rhods-operator
      namespace: redhat-ods-operator
      channel: stable-3.x

  applications:
    rhoai-scaffolding:
      name: rhoai-scaffolding
      namespace: rhoai-maas
      path: charts/rhoai-scaffolding
    networking:
      name: networking
      namespace: rhoai-maas
      path: charts/networking
    cpu-inference-service:
      name: cpu-inference-service
      namespace: rhoai-maas
      path: charts/llm
      extraValueFiles:
        - /overrides/cpu-inference-service.yaml
